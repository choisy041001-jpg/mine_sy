<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>MY인사 화면설계서 v1.4</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
button,input,textarea,select{font-family:inherit;font-size:inherit}
button{cursor:pointer}
:root{
  --accent:#2363a8;--accent-light:#eff5fa;--accent-mid:#558ec3;
  --ink:#111118;--muted:#4a4a5a;--dim:#9898a8;
  --border:#e8e8ef;--surface:#ffffff;--bg:#f7f7fa;
  --success:#16a34a;--danger:#dc2626;--warning:#d97706;
  --sidebar:240px;
}
html,body{height:100vh;overflow:hidden}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic','Segoe UI',sans-serif;font-size:13px;color:var(--ink);background:var(--bg);display:flex;flex-direction:column}

/* ── Toolbar ── */
#toolbar{height:46px;background:#0f172a;display:flex;align-items:center;gap:8px;padding:0 14px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.logo{display:flex;align-items:center;gap:8px}
.logo-mark{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--accent-mid));border-radius:7px;display:grid;place-items:center;font-weight:900;font-size:11px;color:#fff;letter-spacing:-.03em}
.logo-text{font-weight:800;font-size:13px;color:#fff;letter-spacing:-.02em}
.logo-ver{font-size:10px;color:#64748b;margin-left:2px}
.tb-sep{width:1px;height:20px;background:#1e3a5f;flex-shrink:0;margin:0 4px}
.tb-spacer{flex:1}
#auth-btn{border:none;border-radius:5px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s;white-space:nowrap}
#auth-btn.ro{background:#1e3a5f;color:#94a3b8}#auth-btn.ro:hover{background:#334155;color:#e2e8f0}
#auth-btn.ed{background:#166534;color:#86efac}#auth-btn.ed:hover{background:#15803d;color:#fff}
#dl-btn{background:#1e3a5f;color:#94a3b8;border:none;border-radius:5px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer}
#dl-btn:hover{background:#2563eb;color:#fff}

/* ── Layout ── */
#layout{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
#sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
#sidebar::-webkit-scrollbar{width:4px}#sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sb-header{padding:12px 12px 8px;border-bottom:1px solid var(--border)}
.sb-header h3{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.07em}
.screen-count{font-size:10px;color:var(--dim);margin-top:2px}
.sb-group{padding:6px 0}
.sb-group-label{padding:8px 12px 3px;font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:4px}
.sb-group-label::after{content:'';flex:1;height:1px;background:var(--border)}
.sb-item{display:flex;align-items:center;gap:6px;padding:6px 10px 6px 14px;cursor:pointer;border-radius:6px;margin:1px 4px;transition:background .12s;border-left:2px solid transparent}
.sb-item:hover{background:var(--accent-light)}
.sb-item.active{background:var(--accent-light);border-left-color:var(--accent)}
.sb-item .sid{font-size:9px;font-weight:700;color:var(--dim);background:#f1f5f9;border-radius:3px;padding:1px 4px;white-space:nowrap;flex-shrink:0}
.sb-item.active .sid{background:var(--accent-light);color:var(--accent)}
.sb-item .sname{font-size:11px;font-weight:500;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-item.active .sname{color:var(--accent);font-weight:700}
.sb-item .stype{font-size:9px;color:var(--dim)}
.sb-item .sassign{font-size:9px;color:var(--dim);background:#f1f5f9;border-radius:3px;padding:1px 4px;white-space:nowrap;flex-shrink:0;max-width:80px;overflow:hidden;text-overflow:ellipsis}
.sb-item.active .sassign{background:rgba(35,99,168,.12);color:var(--accent)}

/* ── Main ── */
#main{flex:1;display:flex;overflow:hidden}

/* ── Proto pane ── */
#proto-pane{flex:1;min-width:0;background:#ddd8e8;display:flex;flex-direction:column;overflow:hidden;position:relative;border-right:1px solid var(--border)}
#proto-label{padding:4px 10px;background:#0f172a;color:#64748b;font-size:10px;font-weight:600;letter-spacing:.06em;flex-shrink:0;display:flex;align-items:center;gap:6px}
#proto-label .plabel-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#proto-label span{color:#7dd3fc}
#assign-screen-badge{font-size:9px;color:#4ade80;background:#052e16;border:1px solid #166534;border-radius:3px;padding:1px 6px;white-space:nowrap;max-width:110px;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
#live-screen-badge{font-size:9px;color:#fbbf24;background:#1c1001;border:1px solid #92400e;border-radius:3px;padding:1px 6px;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
#lock-btn,#assign-btn{border:none;border-radius:4px;padding:2px 8px;font-size:10px;font-weight:700;cursor:pointer;transition:background .15s;white-space:nowrap;flex-shrink:0}
#lock-btn.locked{background:#1e3a5f;color:#7dd3fc}
#lock-btn.locked:hover{background:#2563eb;color:#fff}
#lock-btn.unlocked{background:#3f1e00;color:#fb923c}
#lock-btn.unlocked:hover{background:#c2410c;color:#fff}
#assign-btn{background:#0c4a6e;color:#7dd3fc}
#assign-btn:hover{background:#0369a1;color:#fff}
#proto-frame-wrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:16px;position:relative}
#proto-iframe{border:none;display:block;flex-shrink:0}
#proto-lock-overlay{display:none;position:absolute;inset:0;z-index:20;cursor:not-allowed}
#proto-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--dim);font-size:13px}
#proto-empty svg{opacity:.25}

/* ── Spec pane ── */
#spec-pane{width:360px;flex-shrink:0;display:flex;flex-direction:column;background:var(--surface);overflow:hidden}
#spec-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
#spec-screen-id{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.07em}
#spec-screen-title{font-size:17px;font-weight:800;color:var(--ink);margin:2px 0 6px;letter-spacing:-.02em}
.spec-meta-row{display:flex;align-items:baseline;gap:6px;margin-bottom:3px}
.spec-meta-label{font-size:10px;font-weight:700;color:var(--dim);white-space:nowrap;flex-shrink:0;text-transform:uppercase;letter-spacing:.05em}
.spec-meta-val{font-size:11px;color:var(--muted);line-height:1.5}
#spec-body{flex:1;overflow-y:auto;display:flex;flex-direction:column}
#spec-body::-webkit-scrollbar{width:4px}
#spec-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.spec-section{padding:10px 14px;border-bottom:1px solid var(--border)}
.spec-section-title{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.add-desc-btn{background:none;border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:10px;color:var(--dim);cursor:pointer;display:none}
.add-desc-btn:hover{border-color:var(--accent);color:var(--accent)}
.desc-item{display:flex;align-items:flex-start;gap:6px;margin-bottom:6px;position:relative}
.desc-num{width:18px;height:18px;border-radius:50%;background:var(--danger);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:3px;border:1.5px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.desc-ta{flex:1;border:1px solid transparent;border-radius:5px;padding:4px 6px;font-size:11px;line-height:1.6;resize:none;background:transparent;color:var(--ink);min-height:28px}
.desc-ta:focus{outline:none;border-color:var(--accent);background:#f8faff}
.desc-ta[readonly]{cursor:default}
.desc-del{background:none;border:none;color:#d1d5db;font-size:15px;padding:0 2px;cursor:pointer;flex-shrink:0;line-height:1;margin-top:2px;display:none}
.desc-del:hover{color:var(--danger)}
.cp-section{padding:10px 14px;flex:1;display:flex;flex-direction:column}
.cp-section-title{font-size:10px;font-weight:700;color:#374151;background:#f1f5f9;padding:6px 10px;margin:-10px -14px 8px;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border)}
#cp-ta{flex:1;border:1px solid transparent;border-radius:5px;padding:6px 8px;font-size:11px;line-height:1.7;resize:none;background:transparent;color:var(--muted);min-height:80px}
#cp-ta:focus{outline:none;border-color:var(--accent);background:#f8faff}

/* ── Dialogs ── */
.dlg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;align-items:center;justify-content:center}
.dlg.open{display:flex}
.dlg-box{background:#fff;border-radius:12px;padding:28px 32px;box-shadow:0 16px 48px rgba(0,0,0,.2);text-align:center;min-width:290px}
.dlg-box h3{font-size:15px;font-weight:800;color:var(--ink);margin-bottom:6px}
.dlg-box p{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6}
.dlg-inp{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:10px 12px;font-size:16px;text-align:center;letter-spacing:.35em;outline:none;margin-bottom:4px}
.dlg-inp:focus{border-color:var(--accent)}
.dlg-err{color:var(--danger);font-size:11px;min-height:16px;margin-bottom:8px}
.dlg-acts{display:flex;gap:8px;justify-content:center}
.dlg-acts button{padding:8px 22px;border-radius:7px;border:none;font-size:13px;font-weight:700;cursor:pointer}
.btn-ok{background:var(--accent);color:#fff}
.btn-ok:hover{background:#1a4a7a}
.btn-cancel{background:#e2e8f0;color:#374151}
.btn-cancel:hover{background:#cbd5e1}
</style>
</head>
<body>

<div id="toolbar">
  <div class="logo">
    <div class="logo-mark">MY</div>
    <span class="logo-text">MY인사 화면설계서</span>
    <span class="logo-ver">v1.4</span>
  </div>
  <span class="tb-sep"></span>
  <span id="tb-screen-name" style="font-size:12px;color:#64748b"></span>
  <span class="tb-spacer"></span>
  <button id="dl-btn" onclick="downloadHtml()">⬇ HTML 저장</button>
  <span class="tb-sep"></span>
  <button id="auth-btn" class="ro" onclick="toggleAuth()">🔒 보기 전용</button>
</div>

<div id="layout">
  <nav id="sidebar">
    <div class="sb-header">
      <h3>화면 목록</h3>
      <div class="screen-count" id="screen-count"></div>
    </div>
    <div id="sb-list"></div>
  </nav>

  <div id="main">
    <div id="proto-pane">
      <div id="proto-label"><span class="plabel-name">PROTOTYPE — <span id="proto-screen-name">선택 없음</span></span><span id="assign-screen-badge" style="display:none"></span><span id="live-screen-badge" style="display:none"></span><button id="lock-btn" class="unlocked" onclick="toggleLock()">🔓 인터랙션</button><button id="assign-btn" onclick="assignScreen()" style="display:none" title="현재 보이는 화면을 이 항목에 저장">현재 화면으로 지정</button></div>
      <div id="proto-frame-wrap">
        <iframe id="proto-iframe" style="display:none"></iframe>
        <div id="proto-lock-overlay"></div>
        <div id="proto-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="2" width="14" height="20" rx="2"/><circle cx="12" cy="17" r="1"/></svg>
          <div>좌측에서 화면을 선택하세요</div>
        </div>
      </div>
    </div>

    <div id="spec-pane">
      <div id="spec-header">
        <div id="spec-screen-id">—</div>
        <div id="spec-screen-title">화면을 선택하세요</div>
        <div id="spec-meta"></div>
      </div>
      <div id="spec-body">
        <div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12px;padding:32px">화면 목록에서 항목을 선택하면<br>사양이 표시됩니다</div>
      </div>
    </div>
  </div>
</div>

<div class="dlg" id="dlg-auth">
  <div class="dlg-box">
    <h3>🔐 편집 모드</h3>
    <p>4자리 비밀번호를 입력하세요</p>
    <input class="dlg-inp" id="auth-inp" type="password" maxlength="4" placeholder="••••" oninput="if(this.value.length===4)confirmAuth()" onkeydown="if(event.key==='Enter')confirmAuth()">
    <div class="dlg-err" id="auth-err"></div>
    <div class="dlg-acts">
      <button class="btn-ok" onclick="confirmAuth()">확인</button>
      <button class="btn-cancel" onclick="closeDlg('dlg-auth')">취소</button>
    </div>
  </div>
</div>

<script>
/* ── 화면 데이터 ── */
const SCREENS = [

     '입력 영역/비밀번호 입력 필드: 텍스트 가림 처리 + 우측 표시/숨기기 토글 아이콘 / 최대 50자',

   enter:'게시판 홈(M-002)에서 게시글 행 탭',
   next:'M-004 게시글 상세 / M-005 글 작성',
   descs:[
     '상단 내비게이션/[← 뒤로] 버튼 + 게시판명',
     '게시글 목록/공지 글: 핀(📌) 아이콘으로 구분, 항상 상단 고정',
     '게시글 목록/일반 글: 제목 / 작성자 / 날짜 / 댓글 수',

let saved = {};

  } catch(e) {}

  // 임베디드 데이터 확인 (다운로드 파일)

    saved = window.__SAVED_SPEC__;
  }

  document.getElementById('dlg-auth').addEventListener('click', e => {
    if (e.target.id === 'dlg-auth') closeDlg('dlg-auth');

/* ── 프로토타입 ── */
const LS_ASSIGN = 'myinsa_v14_assign';
const iframe = document.getElementById('proto-iframe');

let assignments = {};         // { specId: protoScreenName }
let mobileProtoHtml = null, pcProtoHtml = null;
let mobileBlobUrl = null, pcBlobUrl = null;
let protosReady = null;
let currentProtoType = null;
let _locked = false;
let _liveScreen = null;       // 현재 proto에 표시 중인 화면 이름 (postMessage 추적)
let _lastTarget = null;       // navigateTo에 마지막으로 요청한 화면 이름 (폴백용)

// proto 내부에서 화면 전환 시 알림 수신
window.addEventListener('message', function(e) {
  if (!e.data || e.data.type !== 'se-screen-changed') return;
  _liveScreen = e.data.screen || null;
  // 라이브 화면 배지 갱신
  const live = document.getElementById('live-screen-badge');
  if (live) {
    live.textContent = _liveScreen ? `▶ ${_liveScreen}` : '';
    live.style.display = _liveScreen ? 'inline-block' : 'none';
  }
});

// proto 내부 주입 스크립트: 화면 전환 인터셉트 + 부모에 알림
const NAV_SCRIPT = `<scr`+`ipt>
(function(){
  function notify(s){
    if(!s)return;
    try{window.parent.postMessage({type:'se-screen-changed',screen:s},'*');}catch(e){}
  }
  // 화면 이동 요청 수신
  window.addEventListener('message',function(e){
    var d=e.data;if(!d||d.type!=='se-nav')return;
    var s=d.screen||d.page||'';if(!s)return;
    if(window.showScreen){showScreen(s);return;}
    if(window.goPageByName){goPageByName(s);return;}
    var el=document.querySelector('.nav-item[data-page="'+s+'"]');if(el)el.click();
  });
  // showScreen / goPage 래핑 — DOMContentLoaded 이후 함수가 정의된 뒤 실행
  document.addEventListener('DOMContentLoaded',function(){
    if(window.showScreen){
      var _o=window.showScreen;
      window.showScreen=function(n,h){_o.call(this,n,h);notify(n);};
    }
    if(window.goPage){
      var _g=window.goPage;
      window.goPage=function(el){_g.call(this,el);notify(el&&el.dataset&&el.dataset.page);};
    }
    // 초기 화면 알림
    setTimeout(function(){
      var el=document.querySelector('.screen.active')||document.querySelector('.nav-item.active');
      if(el)notify(el.dataset.screen||el.dataset.page);
    },50);
  });
})();
</scr`+`ipt>`;

// localStorage에서 assignments 로드 (없으면 SCREENS 기본값)
function initAssignments() {
  let saved = {};
  try { saved = JSON.parse(localStorage.getItem(LS_ASSIGN) || '{}'); } catch(e) {}
  SCREENS.forEach(s => { assignments[s.id] = saved[s.id] || s.screen; });
}

function saveAssignments() {
  localStorage.setItem(LS_ASSIGN, JSON.stringify(assignments));
}

function refreshSidebarBadge(id) {
  const el = document.querySelector(`.sassign[data-assign-id="${id}"]`);
  if (el) el.textContent = assignments[id] || '';
}

// 타입별 단일 blob URL 생성
function createProtoBlobUrl(html) {
  const modified = html.includes('</body>')
    ? html.replace('</body>', NAV_SCRIPT + '</body>')
    : html + NAV_SCRIPT;
  return URL.createObjectURL(new Blob([modified], {type:'text/html'}));
}

async function initProtos() {
  try {
    const r = await fetch('./MY인사_모바일_v70_proto_only.html');
    mobileProtoHtml = await r.text();
    mobileBlobUrl = createProtoBlobUrl(mobileProtoHtml);
  } catch(e) { console.warn('모바일 proto 로드 실패', e); }
  try {
    const r = await fetch('./MY인사_PC_v31.html');
    pcProtoHtml = await r.text();
    pcBlobUrl = createProtoBlobUrl(pcProtoHtml);
  } catch(e) { console.warn('PC proto 로드 실패', e); }
}

// blob URL(same-origin)에서 직접 contentWindow 접근으로 화면 이동
function navigateTo(screen, type) {
  if (!screen) return;
  _lastTarget = screen;
  try {
    if (type === 'mobile') {
      iframe.contentWindow.showScreen(screen);
    } else {
      if (typeof iframe.contentWindow.goPageByName === 'function') {
        iframe.contentWindow.goPageByName(screen);
      } else {
        const el = iframe.contentWindow.document.querySelector(`.nav-item[data-page="${screen}"]`);
        if (el) el.click();
      }
    }
  } catch(e) {
    try { iframe.contentWindow.postMessage({type:'se-nav', screen, page: screen}, '*'); } catch(e2) {}
  }
  // 래퍼가 동작하지 않아도 최소한 마지막 요청 화면을 _liveScreen에 보장
  if (!_liveScreen) _liveScreen = screen;
}

// 현재 proto 화면 읽기: DOM 직접 접근 → postMessage 추적값 → 마지막 요청값 순으로 시도
function readCurrentScreen(type) {
  try {
    if (type === 'mobile') {
      const el = iframe.contentWindow.document.querySelector('.screen.active')
               || iframe.contentWindow.document.querySelector('[data-screen].active');
      if (el?.dataset.screen) return el.dataset.screen;
    } else {
      const el = iframe.contentWindow.document.querySelector('.nav-item.active')
               || iframe.contentWindow.document.querySelector('[data-page].active');
      if (el?.dataset.page) return el.dataset.page;
    }
  } catch(e) {}
  return _liveScreen || _lastTarget;
}

// 현재 화면을 선택된 spec 항목에 저장
function assignScreen() {
  if (!cur) return;
  const s = SCREENS.find(x => x.id === cur);
  if (!s) return;
  const screen = readCurrentScreen(s.type);
  if (!screen) {
    showToast('화면을 읽을 수 없습니다. 🔓 인터랙션 모드에서 화면을 먼저 이동하세요.', 'warn');
    return;
  }
  assignments[cur] = screen;
  saveAssignments();
  updateAssignUI(cur);
  refreshSidebarBadge(cur);
  showToast(`${cur} → ${screen} 지정 완료`);
}

function updateAssignUI(id) {
  const badge = document.getElementById('assign-screen-badge');
  const btn = document.getElementById('assign-btn');
  if (!badge || !btn) return;
  const screen = assignments[id];
  badge.textContent = screen || '';
  badge.style.display = screen ? 'inline-block' : 'none';
  btn.style.display = id ? 'inline-block' : 'none';
}

function showToast(msg, type) {
  let t = document.getElementById('proto-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'proto-toast';
    t.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);font-size:12px;font-weight:600;padding:8px 20px;border-radius:8px;z-index:9999;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.background = type === 'warn' ? '#7c2d12' : '#1e293b';
  t.style.color = type === 'warn' ? '#fca5a5' : '#e2e8f0';
  t.style.opacity = '1';
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

/* ── 사이드바 렌더 ── */
function renderSidebar() {
  const groups = {};
  SCREENS.forEach(s => { if (!groups[s.g]) groups[s.g] = []; groups[s.g].push(s); });
  const list = document.getElementById('sb-list');
  list.innerHTML = '';
  for (const [g, screens] of Object.entries(groups)) {
    const grp = document.createElement('div'); grp.className = 'sb-group';
    const lbl = document.createElement('div'); lbl.className = 'sb-group-label';
    lbl.innerHTML = g === 'PC — 관리자' ? '🖥 PC 관리자' :
                    g === 'PC — 공통'   ? '🖥 PC 공통' :
                    g === 'PC — 직원'   ? '🖥 PC 직원' :
                    `📱 ${g}`;
    grp.appendChild(lbl);
    screens.forEach(s => {
      const item = document.createElement('div'); item.className = 'sb-item';
      item.dataset.id = s.id;
      item.onclick = () => selectScreen(s.id);
      const assigned = assignments[s.id] || s.screen;
      item.innerHTML = `<span class="sid">${s.id}</span><span class="sname">${s.title}</span><span class="sassign" data-assign-id="${s.id}">${assigned}</span>`;
      grp.appendChild(item);
    });
    list.appendChild(grp);
  }
}

/* ── 화면 선택 ── */
function selectScreen(id) {
  const s = SCREENS.find(x => x.id === id);
  if (!s) return;
  cur = id;

  // 사이드바 active
  document.querySelectorAll('.sb-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));

  // 툴바 이름
  document.getElementById('tb-screen-name').textContent = `${s.id} — ${s.title}`;

  // 프로토타입 로드
  loadProto(s);

  // 스펙 패널 렌더
  renderSpecPanel(s);
}

function toggleLock() {
  _locked = !_locked;
  const btn = document.getElementById('lock-btn');
  const ov = document.getElementById('proto-lock-overlay');
  if (_locked) {
    btn.textContent = '🔒 고정'; btn.className = 'locked';
    if (iframe.style.display !== 'none') ov.style.display = 'block';
  } else {
    btn.textContent = '🔓 인터랙션'; btn.className = 'unlocked';
    ov.style.display = 'none';
  }
}

// _liveScreen 갱신 + 배지 업데이트 (부모 컨텍스트에서 호출)
function setLiveScreen(name) {
  if (!name) return;
  _liveScreen = name;
  const el = document.getElementById('live-screen-badge');
  if (el) { el.textContent = `▶ ${name}`; el.style.display = 'inline-block'; }
}

// iframe 로드 완료 후 showScreen/goPage 를 직접 래핑
// → same-origin 환경에서 DOM 접근 없이 화면 전환 추적
function injectScreenTracker(iw) {
  try {
    if (iw.showScreen && !iw.showScreen.__se) {
      const _o = iw.showScreen;
      iw.showScreen = function(n, h) { _o.call(this, n, h); setLiveScreen(n); };
      iw.showScreen.__se = true;
    }
    if (iw.goPage && !iw.goPage.__se) {
      const _g = iw.goPage;
      iw.goPage = function(el) { _g.call(this, el); setLiveScreen(el && el.dataset && el.dataset.page); };
      iw.goPage.__se = true;
    }
    // 초기 화면 읽기
    const active = iw.document.querySelector('.screen.active, .nav-item.active');
    setLiveScreen(active && (active.dataset.screen || active.dataset.page));
  } catch(e) {
    // cross-origin: NAV_SCRIPT postMessage 폴백이 처리
  }
}

async function loadProto(s) {
  const empty = document.getElementById('proto-empty');
  const lbl = document.getElementById('proto-screen-name');
  const ov = document.getElementById('proto-lock-overlay');

  lbl.textContent = `${s.id} — ${s.title}`;

  // HTML 로드 완료 대기
  if (protosReady) {
    try { await protosReady; } catch(e) {}
  }

  const html = s.type === 'mobile' ? mobileProtoHtml : pcProtoHtml;
  const target = assignments[s.id] || s.screen;

  // 화면 전환 시마다 추적값 초기화 → stale 방지
  _liveScreen = null;
  _lastTarget = null;

  empty.style.display = 'none';
  iframe.style.display = 'block';
  ov.style.display = _locked ? 'block' : 'none';
  updateAssignUI(s.id);

  if (currentProtoType !== s.type) {
    // 다른 타입 → 재로드
    currentProtoType = s.type;
    _liveScreen = null;
    const _snap = {screen: target, type: s.type};
    iframe.onload = () => {
      injectScreenTracker(iframe.contentWindow);
      navigateTo(_snap.screen, _snap.type);
      applyProtoSize();
    };
    if (html) {
      // srcdoc: 항상 same-origin → contentWindow 직접 접근 + 화면 지정 모두 정상 동작
      const modified = html.includes('</body>')
        ? html.replace('</body>', NAV_SCRIPT + '</body>')
        : html + NAV_SCRIPT;
      iframe.removeAttribute('src');
      iframe.srcdoc = modified;
    } else {
      iframe.removeAttribute('srcdoc');
      iframe.src = s.type === 'mobile'
        ? './MY인사_모바일_v70_proto_only.html'
        : './MY인사_PC_v31.html';
    }
  } else {
    // 같은 타입 → 화면만 이동 (iframe 재로드 없음)
    navigateTo(target, s.type);
    applyProtoSize();
  }
}

function applyProtoSize() {
  const s = SCREENS.find(x => x.id === cur);
  if (!s) return;
  const wrap = document.getElementById('proto-frame-wrap');
  const W = Math.max(wrap.clientWidth - 32, 100);
  const H = Math.max(wrap.clientHeight - 32, 100);

  if (s.type === 'mobile') {
    // 375×812 폰 + presentation-wrapper padding(좌우 32px, 상하 40px) 포함 크기
    const nw = 439, nh = 892;
    const scale = Math.min(W / nw, H / nh, 1);
    const sw = Math.ceil(nw * scale), sh = Math.ceil(nh * scale);

    let outer = wrap.querySelector('.proto-scale-outer');
    if (!outer) {
      outer = document.createElement('div');
      outer.className = 'proto-scale-outer';
      wrap.insertBefore(outer, iframe);
      outer.appendChild(iframe);
    }
    outer.style.cssText = `position:relative;flex-shrink:0;overflow:hidden;width:${sw}px;height:${sh}px;border-radius:${Math.round(16*scale)}px;box-shadow:0 8px 32px rgba(0,0,0,.25)`;
    iframe.style.cssText = `border:none;display:block;position:absolute;top:0;left:0;width:${nw}px;height:${nh}px;transform:scale(${scale});transform-origin:top left`;
  } else {
    const outer = wrap.querySelector('.proto-scale-outer');
    if (outer && outer.contains(iframe)) {
      wrap.insertBefore(iframe, outer);
      outer.remove();
    }
    iframe.style.cssText = `border:none;display:block;flex-shrink:0;width:${Math.max(W,300)}px;height:${Math.max(H,400)}px;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.15)`;
  }
}

/* ── 스펙 패널 렌더 ── */
function renderSpecPanel(s) {
  document.getElementById('spec-screen-id').textContent = s.id;
  document.getElementById('spec-screen-title').textContent = s.title;

  const metaEl = document.getElementById('spec-meta');
  metaEl.innerHTML = `
    <div class="spec-meta-row"><span class="spec-meta-label">목적</span><span class="spec-meta-val">${esc(s.purpose)}</span></div>
    <div class="spec-meta-row"><span class="spec-meta-label">진입</span><span class="spec-meta-val">${esc(s.enter)}</span></div>
    <div class="spec-meta-row"><span class="spec-meta-label">다음</span><span class="spec-meta-val">${esc(s.next)}</span></div>`;

  // 저장된 데이터 or 기본값
  const sv = saved[s.id] || {};
  const descs = sv.descs || [...s.descs];
  const cp = sv.cp !== undefined ? sv.cp : s.cp;

  const body = document.getElementById('spec-body');
  body.innerHTML = '';

  // Description section
  const sec = document.createElement('div'); sec.className = 'spec-section';
  const titleRow = document.createElement('div'); titleRow.className = 'spec-section-title';
  titleRow.innerHTML = 'DESCRIPTION';
  const addBtn = document.createElement('button'); addBtn.className = 'add-desc-btn'; addBtn.textContent = '＋ 추가';
  addBtn.style.display = em ? '' : 'none';
  addBtn.onclick = () => addDescItem();
  titleRow.appendChild(addBtn);
  sec.appendChild(titleRow);

  const dl = document.createElement('div'); dl.id = 'desc-list';
  descs.forEach((txt, i) => dl.appendChild(makeDescItem(txt, i)));
  sec.appendChild(dl);
  body.appendChild(sec);

  // Checkpoint section
  const cpSec = document.createElement('div'); cpSec.className = 'cp-section';
  cpSec.innerHTML = '<div class="cp-section-title">CHECK POINT</div>';
  const cpTa = document.createElement('textarea'); cpTa.id = 'cp-ta'; cpTa.value = cp;
  cpTa.readOnly = !em;
  cpTa.oninput = () => saveSpec(s.id);
  cpSec.appendChild(cpTa);
  body.appendChild(cpSec);
}

function makeDescItem(txt, idx) {
  const item = document.createElement('div'); item.className = 'desc-item'; item.dataset.idx = idx;
  const num = document.createElement('div'); num.className = 'desc-num'; num.textContent = idx + 1;
  const ta = document.createElement('textarea'); ta.className = 'desc-ta'; ta.value = txt; ta.rows = 2;
  ta.readOnly = !em;
  ta.oninput = () => { autoHeight(ta); saveSpec(cur); };
  setTimeout(() => autoHeight(ta), 0);
  const del = document.createElement('button'); del.className = 'desc-del'; del.textContent = '×';
  del.style.display = em ? '' : 'none';
  del.onclick = () => { item.remove(); renumberDescs(); saveSpec(cur); };
  item.append(num, ta, del);
  return item;
}

function addDescItem() {
  const list = document.getElementById('desc-list');
  if (!list) return;
  const cnt = list.querySelectorAll('.desc-item').length;
  const item = makeDescItem('', cnt);
  list.appendChild(item);
  item.querySelector('textarea').focus();
  saveSpec(cur);
}

function renumberDescs() {
  document.querySelectorAll('#desc-list .desc-item').forEach((item, i) => {
    item.dataset.idx = i;
    const num = item.querySelector('.desc-num');
    if (num) num.textContent = i + 1;
  });
}

function autoHeight(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── 저장 ── */
function collectSpec(id) {
  const descs = [];
  document.querySelectorAll('#desc-list .desc-ta').forEach(ta => descs.push(ta.value));
  const cpTa = document.getElementById('cp-ta');
  const cp = cpTa ? cpTa.value : '';
  return { descs, cp };
}

function saveSpec(id) {
  if (!id) return;
  saved[id] = collectSpec(id);
  clearTimeout(_saveT);
  _saveT = setTimeout(() => {
    try { localStorage.setItem(LS_KEY, JSON.stringify(saved)); } catch(e) {}
  }, 600);
}

/* ── 다운로드 ── */
function downloadHtml() {
  if (cur) saved[cur] = collectSpec(cur);
  try { localStorage.setItem(LS_KEY, JSON.stringify(saved)); } catch(e) {}

  // 현재 HTML에 데이터 주입
  const html = document.documentElement.outerHTML;
  const inject = `<script id="__spec-data__">window.__SAVED_SPEC__=${JSON.stringify(saved)};<\/script>`;
  // 기존 삽입된 태그 제거 후 재삽입
  const cleaned = html.replace(/<script id="__spec-data__">[\s\S]*?<\/script>/,'');
  const final = cleaned.replace('</head>', inject + '</head>');
  const blob = new Blob([final], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'MY인사_화면설계서_v1.4.html';
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 100);
}

/* ── 인증 ── */
function toggleAuth() {
  if (em) { em = false; applyEM(); }
  else { openDlg('dlg-auth'); }
}
function openDlg(id) {
  if (id === 'dlg-auth') {
    document.getElementById('auth-inp').value = '';
    document.getElementById('auth-err').textContent = '';
  }
  document.getElementById(id).classList.add('open');
  const inp = document.querySelector('#' + id + ' input');
  if (inp) setTimeout(() => inp.focus(), 80);
}
function closeDlg(id) { document.getElementById(id).classList.remove('open'); }
function confirmAuth() {
  if (document.getElementById('auth-inp').value === PW) {
    em = true; closeDlg('dlg-auth'); applyEM();
  } else {
    const el = document.getElementById('auth-err');
    el.textContent = '비밀번호가 틀렸습니다';
    document.getElementById('auth-inp').value = '';
    document.getElementById('auth-inp').focus();
    setTimeout(() => { el.textContent = ''; }, 2000);
  }
}
function applyEM() {
  const btn = document.getElementById('auth-btn');
  btn.className = em ? 'ed' : 'ro';
  btn.textContent = em ? '✏️ 편집 중' : '🔒 보기 전용';
  // 현재 화면 다시 렌더 (edit 상태 반영)
  if (cur) renderSpecPanel(SCREENS.find(s => s.id === cur));
}
</script>
